services:
  neo4j:
    image: neo4j:5
    container_name: movies-neo4j
    ports:
      - "7474:7474"   # Neo4j Browser
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 6G
      NEO4J_server_memory_pagecache_size: 512m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./data:/import
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    container_name: movies-chromadb
    ports:
      - "8001:8000"   # ChromaDB HTTP API (FastAPI uses host 8000)
    volumes:
      - chromadb_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/8000; printf \"GET /api/v2/heartbeat HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; grep -q \"HTTP/1.1 200\" <&3'",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  vllm:
    image: vllm/vllm-openai:latest
    container_name: movies-vllm
    profiles:
      - llm
    gpus: all
    cpus: "8.0"
    ports:
      - "8002:8000"   # vLLM OpenAI-compatible API
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
      TOKENIZERS_PARALLELISM: "true"
      VLLM_WORKER_MULTIPROC_METHOD: spawn
    command:
      - ${VLLM_MODEL:-meta-llama/Llama-3.2-1B-Instruct}
      - --enforce-eager
      - ${VLLM_ENFORCE_EAGER:-false}
      - --gpu-memory-utilization
      - ${VLLM_GPU_MEMORY_UTILIZATION:-0.8}
      - --max-model-len
      - ${VLLM_MAX_MODEL_LEN:-2048}
      #- --max-num-batched-tokens
      #- "8192"
      - --max-num-seqs
      - "64"
    volumes:
      - hf_cache:/root/.cache/huggingface
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:8000/health >/dev/null && curl -fsS http://127.0.0.1:8000/v1/models | grep -q '\"id\"'",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 3m

volumes:
  neo4j_data:
  neo4j_logs:
  chromadb_data:
  hf_cache:
